<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joshua's Portfolio</title>
    <!-- Import Google Fonts for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Append a query string to bust cache for style updates -->

  </head>
  <body>
    <!-- Navigation bar fixed at the top -->
    <header class="navbar">
      <div class="navbar__inner">
        <div class="navbar__logo">Joshua</div>
        <nav class="navbar__links">
          <a href="#projects">Projects</a>
          <a href="#experiments">Experiments</a>
          <a href="#recommendation">Recommendation</a>
        </nav>
      </div>
    </header>
    <!-- Hero section with introduction -->
    <section class="hero">
      <div class="hero__content">
        <h1 class="hero__title">Welcome to my Portfolio</h1>
        <p id="introText" class="hero__subtitle"></p>
      </div>
    </section>
    <!-- Projects section -->
    <section id="projects" class="section">
      <div class="section__inner">
        <h2 class="section__title">Projects</h2>
        <div class="carousel">
          <button class="carousel__btn carousel__btn--prev" data-target="projects">‹</button>
          <div id="projectsContainer" class="carousel__inner"></div>
          <button class="carousel__btn carousel__btn--next" data-target="projects">›</button>
        </div>
      </div>
    </section>
    <!-- Experiments section -->
    <section id="experiments" class="section section--alt">
      <div class="section__inner">
        <h2 class="section__title">Experiments</h2>
        <div class="carousel">
          <button class="carousel__btn carousel__btn--prev" data-target="experiments">‹</button>
          <div id="experimentsContainer" class="carousel__inner"></div>
          <button class="carousel__btn carousel__btn--next" data-target="experiments">›</button>
        </div>
      </div>
    </section>
    <!-- Recommendation section -->
    <section id="recommendation" class="section">
      <div class="section__inner">
          <h2 class="section__title">Letter of Recommendation</h2>
          <div class="recommendation-card">
            <p id="recommendationIntro" class="recommendation__text"></p>
            <p id="recommendationFull" class="recommendation__text recommendation__text--hidden"></p>
            <button id="recommendationToggle" class="btn btn--small">Read more</button>
          </div>
      </div>
    </section>
    <!-- Footer -->
    <footer class="footer">
      <div class="footer__inner">
        <p>© 2025 Joshua. All rights reserved.</p>
      </div>
    </footer>

      from the `<script id="portfolio-data">` element.  Keeping the

084",
